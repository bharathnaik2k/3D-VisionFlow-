<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisionFlow 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div id="hud">
    <h1>✋ VisionFlow 3D</h1>
    <p class="subtitle">Show your hand to the camera. Move it around to control the sphere's position and rotation.</p>
    <div id="status">
      <span class="dot"></span>
      <span id="statusText">Starting 3D engine...</span>
    </div>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <p>Visual Mode</p>
      <div class="btns">
        <button id="mode-neon" class="active">Neon Orbit</button>
        <button id="mode-sun">Golden Sun</button>
      </div>
    </div>

    <div id="error"></div>
  </div>

  <div id="handIndicator">
    <span>✋ Hand position:</span>
    <span class="coords" id="coordsDisplay">X:0.0 Y:0.0</span>
  </div>

  <video id="miniVideo" autoplay playsinline muted class="hidden"></video>
  <canvas id="scene"></canvas>

  <!-- Load App -->
  <script type="module" src="js/main.js"></script>
</body>

</html>
